# Hermes Agent native plugin manifest.
#
# This file is read ONLY by Hermes Agent (Nous Research). Claude Code, Cowork,
# OpenAI Codex, Cursor, GitHub Copilot CLI, Google Antigravity, and OpenClaw
# all read their own manifest paths and ignore this file. See README.md
# "Supported surfaces" for per-platform install commands.
#
# Spec source: https://hermes-agent.nousresearch.com/docs/guides/build-a-hermes-plugin
# Tested against: Hermes Desktop v0.15.2 (June 2026 public preview)
#
# Install for Hermes users:
#   hermes plugins install indranilbanerjee/digital-marketing-pro
#
# Hermes will clone this repo into ~/.hermes/plugins/digital-marketing-pro/,
# read this plugin.yaml, then call register(ctx) from __init__.py which walks
# the skills/ directory and exposes every SKILL.md to Hermes via ctx.register_skill().

name: digital-marketing-pro
version: 3.14.0
description: >-
  Open-source AI marketing plugin for agencies & in-house teams. 158 skills,
  25 specialist agents, 12-Part Strategy Flow, Cowork team-persistent, EU AI
  Act Article 50 ready. Now native on Hermes Agent.
author: Indranil Banerjee
license: MIT
homepage: https://github.com/indranilbanerjee/digital-marketing-pro

# We don't register any Hermes-side Python tools (we're a skills-only plugin).
# All 158 skills are auto-registered from skills/ at register() time.
provides_tools: []

# We don't register any Hermes lifecycle hooks (zero global hooks policy across
# all platforms — same as our Claude Code .hooks/hooks.json which ships empty).
provides_hooks: []

# No environment variables required at install time. Brand state lives at
# ~/.claude-marketing/<brand>/ (works on every platform that has a host
# filesystem; on Cowork use /digital-marketing-pro:cowork-setup to route
# through a Drive MCP). Connectors are opt-in via the user's own MCP setup.
requires_env: []
